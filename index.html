<!DOCTYPE html>
<html>
<head>
<title>LIENKEN Shock Absorbing Material & Smart Power Supply</title>
<meta charset="utf-8">
<meta name="description" content="LIENKEN Shock Absorbing Material & Smart Power Supply">
<meta name="keywords" content="lienken, shock absorbing material, power supply">  
<meta name="viewport" content="width=device-width, initial-scale=1">


</head>
<body>

    <script>
        /* Storing user's device details in a variable*/
        let details = navigator.userAgent;
  
        /* Creating a regular expression 
        containing some mobile devices keywords 
        to search it in details string*/
	let regexp = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|kindle/i;
        /* let regexp = /android|iphone|kindle|ipad/i; */
  
        /* Using test() method to search regexp in details
        it returns boolean value*/
        let isMobileDevice = regexp.test(details);
  
        if (isMobileDevice) {
            location.href = "https://lienken.github.io/mobile.html";
        } else {
		location.href = "https://lienken.github.io/desktop.html";
            /*document.write("You are using Desktop");*/
        }
    </script>
</body>
</html>
